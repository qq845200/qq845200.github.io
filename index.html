<style>

  body { font-family: -apple-system, "SF Pro Text", "Helvetica Neue", Arial, sans-serif; background: #fafafa; color: #333; line-height: 1.8; }

  .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; padding: 80px 20px; text-align: center; }
  .header h1 { font-size: 2.4em; font-weight: 700; margin-bottom: 10px; }

  .container { max-width: 760px; margin: 0 auto; padding: 40px 20px; }

  .post { background: #fff; border-radius: 12px; padding: 32px; margin-bottom: 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); transition: transform 0.2s, box-shadow 0.2s; }
  .post:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
  .post h2 { font-size: 1.4em; margin-bottom: 8px; color: #1a1a1a; }
  .post h2 a { text-decoration: none; color: inherit; }
  .post h2 a:hover { color: #667eea; }
  .meta { font-size: 0.85em; color: #999; margin-bottom: 16px; }
  .tag { display: inline-block; background: #f0f0f5; color: #667eea; padding: 2px 10px; border-radius: 20px; font-size: 0.8em; margin-right: 6px; }
  .post p { color: #555; }
  .read-more { display: inline-block; margin-top: 12px; color: #667eea; text-decoration: none; font-size: 0.9em; }
  .read-more:hover { text-decoration: underline; }

  .footer { text-align: center; padding: 40px 20px; color: #aaa; font-size: 0.85em; }
  .footer a { color: #667eea; text-decoration: none; }
</style>
</head>
